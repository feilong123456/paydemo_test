<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Typelist')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-typelist" data-rule="required" class="form-control selectpicker" name="row[typelist]">
                {foreach name="typelistList" item="vo"}
                    <option value="{$key}" {in name="key" value="$row.typelist"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
   <!-- <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Worktime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-worktime" class="form-control "  data-use-current="true" name="row[worktime]" type="text" value="{:$row.worktime}">
        </div>
    </div>-->
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Starttime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-starttime" data-rule="required" class="form-control datetimepicker"  data-date-format="HH:mm:ss" data-use-current="true" name="row[starttime]" type="text" value="{:$row.sstarttime}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Endtime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-endtime" data-rule="required" class="form-control datetimepicker"  data-date-format="HH:mm:ss" data-use-current="true" name="row[endtime]" type="text" value="{:$row.sendtime}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Startbefore')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-startbefore" class="form-control" name="row[startbefore]" type="number" value="{$row.startbefore|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Endbefore')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-endbefore" class="form-control" name="row[endbefore]" type="number" value="{$row.endbefore|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Typedata')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="typedataList" item="vo"}
            <label for="row[typedata]-{$key}"><input id="row[typedata]-{$key}" name="row[typedata]" type="radio" value="{$key}" {in name="key" value="$row.typedata"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Reststarttime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-reststarttime" class="form-control datetimepicker" data-date-format="HH:mm:ss" data-use-current="true" name="row[reststarttime]" type="text" value="{:$row.sreststarttime}">
        </div>
    </div>
    <div class="form-group">
